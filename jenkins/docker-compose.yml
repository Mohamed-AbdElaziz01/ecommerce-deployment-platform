version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "8081:8080"   # Jenkins UI (8080 is taken by nginx in the main stack)
      - "50000:50000" # Jenkins agent port
    volumes:
      - jenkins-data:/var/jenkins_home
      # Mount Docker socket so Jenkins can build/push images on the host's Docker daemon
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    restart: unless-stopped
    # On every container start/restart:
    #   1. Install the Docker CLI inside the container if it's not already there
    #      (this image doesn't ship with `docker` by default, and trying to bind-mount
    #      the host's /usr/bin/docker doesn't work on Docker Desktop for Windows/Mac,
    #      since that path only exists on Linux hosts).
    #   2. Fix the Docker socket permissions so the jenkins user can use it.
    # This makes the whole setup self-healing across `docker restart`, host
    # reboots, and `docker-compose up` re-runs - no manual fixup steps ever needed.
    entrypoint:
      - bash
      - -c
      - |
        if ! command -v docker >/dev/null 2>&1; then
          rm -f /etc/apt/sources.list.d/docker.list
          apt-get update -qq
          apt-get install -y -qq ca-certificates curl
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          sh /tmp/get-docker.sh
        fi
        chmod 666 /var/run/docker.sock || true
        exec /usr/bin/tini -- /usr/local/bin/jenkins.sh

volumes:
  jenkins-data:
