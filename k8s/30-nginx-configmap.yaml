apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ecommerce
data:
  nginx.conf: |
    worker_processes auto;

    events {
        worker_connections 1024;
    }

    http {
        include       mime.types;
        default_type  application/octet-stream;

        sendfile        on;
        keepalive_timeout  65;

        # Upstream definitions - matches Kubernetes Service names
        upstream web_service {
            server web:3000;
        }

        upstream payment_service {
            server payment-service:4000;
        }

        upstream search_service {
            server search-service:5000;
        }

        # Rate limiting: protect upstream services from abuse
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

        server {
            listen 80;
            server_name localhost;

            # Nginx health check
            location /nginx-health {
                access_log off;
                return 200 "ok\n";
            }

            # Main web/API service - products, auth, orders
            location /api/products {
                limit_req zone=api_limit burst=10 nodelay;
                proxy_pass http://web_service;
                include /etc/nginx/proxy_params.conf;
            }

            location /api/auth {
                limit_req zone=api_limit burst=10 nodelay;
                proxy_pass http://web_service;
                include /etc/nginx/proxy_params.conf;
            }

            location /api/orders {
                limit_req zone=api_limit burst=10 nodelay;
                proxy_pass http://web_service;
                include /etc/nginx/proxy_params.conf;
            }

            # Search service - routed directly for lower latency
            location /api/search {
                limit_req zone=api_limit burst=20 nodelay;
                proxy_pass http://search_service;
                include /etc/nginx/proxy_params.conf;
            }

            # Payment service - internal use, but exposed for completeness
            location /api/payments {
                limit_req zone=api_limit burst=10 nodelay;
                proxy_pass http://payment_service;
                include /etc/nginx/proxy_params.conf;
            }

            # Catch-all to the main web service (health checks, root, etc.)
            location / {
                proxy_pass http://web_service;
                include /etc/nginx/proxy_params.conf;
            }
        }
    }

  proxy_params.conf: |
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
