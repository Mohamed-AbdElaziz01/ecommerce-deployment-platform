apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: ecommerce
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: 'ecommerce'
        orgId: 1
        folder: 'E-Commerce Platform'
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
