# Inventory for the e-commerce platform server(s).
#
# Replace the example IP/hostname below with your actual server
# (e.g. an AWS EC2 public IP once provisioned by Terraform).
#
# For local testing against a VM (VirtualBox, multipass, WSL, etc.),
# point this at that VM's IP instead.

[ecommerce_servers]
app-server ansible_host=203.0.113.10 ansible_user=ubuntu

[ecommerce_servers:vars]
ansible_ssh_private_key_file=~/.ssh/ecommerce-key.pem
ansible_python_interpreter=/usr/bin/python3
